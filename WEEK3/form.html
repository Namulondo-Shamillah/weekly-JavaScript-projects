<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">   
</head>
<body>
    <div class="container">
        <h1> VEHICLE FORM</h1>
    <form id="login-form">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
 
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
   <div class="mb-3">
    <label for="exampleInputName" class="form-label">Customer Name</label>
    <input type="text" class="form-control" id="exampleInputName">
  </div>
    <div class="mb-3">
    <label for="vehicleNumber" class="form-label">Car Number plate</label>
    <input type="text" class="form-control" id="vehicleNumber">
  </div>
    <div class="mb-3">
    <label for="phoneNumber" class="form-label">Customer Phonenumber</label>
    <input type="text" class="form-control" id="phoneNumber">
  </div>

  <button id="submitBtn" type="submit" class="btn btn-primary">Submit</button>
</form>
<p id="message"></p>
<p id="rawHtml"></p>
</div>
<div class="container">
 <h1>ADMIN DASHBOARD</h1>
    <h2>Oyera Auto Service bay</h2></div>
    <div class="container">
    <table class="table" id="dataTable">
  <thead>
    <tr>
      <th scope="col">Customer name</th>
      <th scope="col">Email</th>
      <th scope="col">Phone Number</th>
      <th scope="col">Vehicle Number</th>
    </tr>
  </thead>
  <tbody>
   <!-- //our form data will appear here -->
  </tbody>
</table>
</div>
    <script src="form.js"></script>
</body>
</html>
